name: pokedex
description: Flutter Pokédex App — powered by PokeAPI

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter

  # 상태관리
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # 네트워크
  dio: ^5.4.0
  dio_cache_interceptor: ^3.4.4

  # 라우팅
  go_router: ^13.2.0

  # 이미지
  cached_network_image: ^3.3.1

  # 폰트
  google_fonts: ^6.2.1

  # 로딩 스켈레톤
  shimmer: ^3.0.0

  # 로컬 저장소
  shared_preferences: ^2.2.2

  # 오디오 재생
  audioplayers: ^6.0.0

  # 데이터 모델
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

  # 코드 생성
  build_runner: ^2.4.7
  freezed: ^2.4.6
  json_serializable: ^6.7.1
  riverpod_generator: ^2.3.9
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.3.9

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#CC0000"
  image: assets/splash/splash.png
  android: true
  ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/icon/
    - assets/splash/
